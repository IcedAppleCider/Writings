    <div class="main-wrapper">
      <header class="top-bar">

        </div>
        <div class="now-playing">
          <div class="np-logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>

        </div>

            <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
          </button>
          <div class="volume-control">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>

      <main class="content">
        <div class="album-page-header">
          <div class="album-cover-large cover-f1">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"></path></svg>
          </div>
          <div class="album-details">
            <span class="album-type">Collection</span>
            <h1 class="album-title-large">F1 Universe</h1>
            <span class="album-artist-large">My Fanfics</span>
            <span class="album-meta">2 Stories &bull; Updated 2026</span>
            <div class="album-actions">
              <button class="btn-play-large" id="play-btn">
                <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M8 5v14l11-7z"></path></svg>
                Play
              </button>
              <button class="btn-shuffle-large" id="shuffle-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><polyline points="16 3 21 3 21 8"></polyline><line x1="4" y1="20" x2="21" y2="3"></line><polyline points="21 16 21 21 16 21"></polyline><line x1="15" y1="15" x2="21" y2="21"></line><line x1="4" y1="4" x2="9" y2="9"></line></svg>
                Shuffle
              </button>
            </div>
          </div>
        </div>

        <div class="tracklist">
          <div class="track-header">
            <div class="track-col-index">#</div>
            <div class="track-col-title">Title</div>
            <div class="track-col-meta">Chapters</div>

          <a href="/Writings/F1/fish-needs-car/index.html" class="track-row">
            <div class="track-col-index">
              <span class="index-num">1</span>
              <svg class="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"></path></svg>
            </div>

            <div class="track-col-meta">

          <a href="/Writings/F1/bg3au/our_team.html" class="track-row">
            <div class="track-col-index">
              <span class="index-num">2</span>
              <svg class="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"></path></svg>
            </div>

            <div class="track-col-meta">

              <span class="meta-words">60,830 Words</span>
            </div>

        </div>
      </main>
    </div>
  </div>
  <script>
    const themeToggle = document.getElementById('theme-toggle');
    const sunIcon = themeToggle.querySelector('.sun-icon');
    const moonIcon = themeToggle.querySelector('.moon-icon');

    // Check saved theme
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'light') {
      document.body.classList.add('light-mode');
      sunIcon.style.display = 'none';
      moonIcon.style.display = 'block';
    }

    themeToggle.addEventListener('click', () => {
      document.body.classList.toggle('light-mode');
      const isLight = document.body.classList.contains('light-mode');
      
      if (isLight) {
        localStorage.setItem('theme', 'light');
        sunIcon.style.display = 'none';
        moonIcon.style.display = 'block';
      } else {
        localStorage.setItem('theme', 'dark');
        sunIcon.style.display = 'block';
        moonIcon.style.display = 'none';
      }
    });

    document.getElementById('play-btn').addEventListener('click', () => {
      const tracks = document.querySelectorAll('.track-row');
      if (tracks.length > 0) {
        const firstUrl = tracks[0].getAttribute('href');
        if (firstUrl) {
          window.location.href = firstUrl;
        }
      }
    });

    document.getElementById('shuffle-btn').addEventListener('click', () => {
      const tracks = document.querySelectorAll('.track-row');
      if (tracks.length > 0) {
        const randomIndex = Math.floor(Math.random() * tracks.length);
        const randomUrl = tracks[randomIndex].getAttribute('href');
        if (randomUrl) {
          window.location.href = randomUrl;
        }
      }
    });
  </script>
